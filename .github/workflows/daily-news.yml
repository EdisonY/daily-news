name: Daily News Workflow

on:
  # 定时触发：每天北京时间 08:00 (UTC 00:00)
  schedule:
    - cron: '0 0 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      skip_dedup:
        description: '跳过去重处理'
        required: false
        default: 'false'
        type: boolean
      skip_notify:
        description: '跳过推送通知'
        required: false
        default: 'false'
        type: boolean

# 允许写入内容到 GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# 只允许一个并发运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. 设置 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. 创建数据目录
      - name: Create data directories
        run: |
          mkdir -p data/history
          mkdir -p data/$(date +%Y-%m-%d)
      
      # 5. 下载历史记录（如果存在）
      - name: Download history
        uses: actions/download-artifact@v4
        with:
          name: news-history
          path: data/history
        continue-on-error: true
      
      # 6. 运行抓取脚本
      - name: Run daily news script
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd scripts
          python main.py \
            ${{ inputs.skip_dedup == 'true' && '--skip-dedup' || '' }} \
            ${{ inputs.skip_notify == 'true' && '--skip-notify' || '' }} \
            --report-url "https://edisony.github.io/daily-news/$(date +%Y-%m-%d)/"
      
      # 7. 上传历史记录（用于下次运行）
      - name: Upload history
        uses: actions/upload-artifact@v4
        with:
          name: news-history
          path: data/history
          retention-days: 30
      
      # 8. 生成 GitHub Pages 首页
      - name: Generate index page
        run: |
          python scripts/generate_index.py
      
      # 9. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data
          destination_dir: .
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy daily news - $(date +%Y-%m-%d)'
